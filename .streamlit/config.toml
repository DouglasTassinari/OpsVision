# Tema do Sistema TAZZIN — paleta e tipografia da identidade visual da marca
# (docs/marca/Manual_Conceitual_de_Marca_TAZZIN_v1.pdf).
#
# Azul marinho no fundo (confiança, estabilidade) e o verde reservado para
# ação e destaque (crescimento, evolução): a aplicação sobre fundo escuro
# prevista no manual.

[[theme.fontFaces]]
family = "Poppins"
url = "https://fonts.gstatic.com/s/poppins/v24/pxiByp8kv8JHgFVrLDz8Z1xlFQ.woff2"
weight = 300
style = "normal"

[[theme.fontFaces]]
family = "Poppins"
url = "https://fonts.gstatic.com/s/poppins/v24/pxiEyp8kv8JHgFVrJJfecg.woff2"
weight = 400
style = "normal"

[[theme.fontFaces]]
family = "Poppins"
url = "https://fonts.gstatic.com/s/poppins/v24/pxiByp8kv8JHgFVrLEj6Z1xlFQ.woff2"
weight = 600
style = "normal"

[[theme.fontFaces]]
family = "Poppins"
url = "https://fonts.gstatic.com/s/poppins/v24/pxiByp8kv8JHgFVrLCz7Z1xlFQ.woff2"
weight = 700
style = "normal"

[theme]
base = "dark"
primaryColor = "#4CAF50"              # Verde — ação, foco, destaque
backgroundColor = "#0D1B2A"           # Azul marinho — fundo
secondaryBackgroundColor = "#1F2937"  # Grafite — cards, sidebar, inputs
textColor = "#F2F4F7"                 # Cinza claro — texto
linkColor = "#4CAF50"                 # Verde
font = "Poppins, sans-serif"
